name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node --check bin/cli.js
      - run: node -e "require('node:module').createRequire(process.cwd()+'/bin/cli.js').resolve('mcp-remote/dist/proxy.js')"
